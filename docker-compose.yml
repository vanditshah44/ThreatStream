services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: threatstream-api
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite:////app/data/threatstream.db
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/app/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

